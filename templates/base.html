<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MechAssist</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="src/style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Sansation:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap"
    rel="stylesheet">
</head>

<body class="bg">
  <div id="container">
    <div id="header">
      <h1 class="divider logo">MECH•ASSIST</h1>
      <h1 id="subheader" class="divider">Hey there! What question do you have about your car?</h1>
    </div>
    <main>
      <form method="POST">
        <input type="text" name="prompt" placeholder="Type your question here..." id="promptInput">
        <input type="submit" class="submit" value="Ask">
      </form>

      <div id="chatcontent">
        {% if newOutput %}
        {{ newOutput }}
        <strong></strong> {{ output }}
        {% endif %}<br><br>

      </div>
    </main>

  </div>

  <h2 id="donate">
    Click here to support and help improve my MechAssist!:
    <a href="https://www.paypal.com/donate/?business=R4CEZAQB6AEWQ&no_recurring=0&item_name=Support+the+development+of+making+a+more+advanced+AI+Mechanic!&currency_code=USD"
      target="_blank">Donate Here</a>
  </h2>

</body>

</html>
